services:
  bifrost:
    image: maximhq/bifrost:${IMAGE}
    container_name: bifrost
    restart: "no"
    env_file:
      - ./bifrost.env
      - ./bifrost.env.local
    networks:
      - database
      - genai
      - proxy
    volumes:
      - ${DATA_DIR}:/app/data
    # Same check upstream ships in newer image builds (alpine base, busybox wget)
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1GB
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bifrost.entrypoints=websecure"
      - "traefik.http.routers.bifrost.rule=Host(`bifrost.${TRAEFIK_ACME_DOMAIN}`)"
      - "traefik.http.routers.bifrost.tls.certresolver=cloudflare"
      - "traefik.http.services.bifrost.loadbalancer.server.port=8080"
      - "homepage.group=Artificial Intelligence"
      - "homepage.name=Bifrost"
      - "homepage.icon=/icons/bifrost.png"
      - "homepage.href=https://bifrost.${TRAEFIK_ACME_DOMAIN}"

networks:
  database:
    external: true
  genai:
    external: true
  proxy:
    external: true
