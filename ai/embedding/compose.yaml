services:
  tei-embedder:
    image: ghcr.io/huggingface/text-embeddings-inference:86-latest
    container_name: tei-embed
    restart: "no"
    env_file:
      - hf.env
    entrypoint:
      - /bin/bash
      - /entrypoint-wrapper.sh
    environment:
      - MODEL_ID=${EMBEDDER_MODEL}
      - DTYPE=float32
    networks:
      - genai
      - proxy
    ports:
      - 127.0.0.1:4001:4000
    volumes:
      - ${DATA_DIR}:/data
      - ./entrypoint.sh:/entrypoint-wrapper.sh:ro
    tmpfs:
      - /usr/local/cuda/compat
    secrets:
      - hf_token
    devices:
      - nvidia.com/gpu=${GPU_ID}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4GB

  tei-reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:86-latest
    container_name: tei-rerank
    restart: "no"
    env_file:
      - hf.env
    entrypoint:
      - /bin/bash
      - /entrypoint-wrapper.sh
    environment:
      - MODEL_ID=${RERANKER_MODEL}
    networks:
      - genai
      - proxy
    ports:
      - 127.0.0.1:4002:4000
    volumes:
      - ${DATA_DIR}:/data
      - ./entrypoint.sh:/entrypoint-wrapper.sh:ro
    tmpfs:
      - /usr/local/cuda/compat
    secrets:
      - hf_token
    devices:
      - nvidia.com/gpu=${GPU_ID}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4GB

  # Healthcheck is built into the image: the binary self-probes /health via
  # its --healthcheck flag (the scratch image has no shell or HTTP client)
  tei-proxy:
    image: ghcr.io/delfianto/tei-proxy:latest
    container_name: tei-proxy
    restart: "no"
    env_file:
      - proxy.env
    networks:
      - genai
      - proxy
    ports:
      - 4000:4000
    deploy:
      resources:
        limits:
          memory: 128MB

networks:
  genai:
    external: true
  proxy:
    external: true

secrets:
  hf_token:
    file: ${DATA_DIR}/hf_token
