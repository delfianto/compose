services:
  tei-embedder:
    image: ghcr.io/huggingface/text-embeddings-inference:86-latest
    container_name: tei-embed
    restart: "no"
    env_file:
      - ./hf.env
    entrypoint:
      - /bin/bash
      - -c
      - |
        if [ -f "$${HF_TOKEN_FILE}" ]; then
          export HF_TOKEN=$$(cat "$${HF_TOKEN_FILE}")
        fi
        if [ -d /usr/local/cuda/compat ]; then
          mv /usr/local/cuda/compat /usr/local/cuda/compat.disabled
        fi
        exec /entrypoint.sh "$$@"
      - "--"
    environment:
      - MODEL_ID=${EMBEDDER_MODEL}
      - DTYPE=float32
    networks:
      - genai
      - proxy
    ports:
      - 127.0.0.1:4001:4000
    volumes:
      - ${DATA_DIR}:/data
    secrets:
      - hf_token
    devices:
      - nvidia.com/gpu=${GPU_ID}
    deploy:
      resources:
        limits:
          memory: 12GB

  tei-reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:86-latest
    container_name: tei-rerank
    restart: "no"
    env_file:
      - ./hf.env
    entrypoint:
      - /bin/bash
      - -c
      - |
        if [ -f "$${HF_TOKEN_FILE}" ]; then
          export HF_TOKEN=$$(cat "$${HF_TOKEN_FILE}")
        fi
        if [ -d /usr/local/cuda/compat ]; then
          mv /usr/local/cuda/compat /usr/local/cuda/compat.disabled
        fi
        exec /entrypoint.sh "$$@"
      - "--"
    environment:
      - MODEL_ID=${RERANKER_MODEL}
    networks:
      - genai
      - proxy
    ports:
      - 127.0.0.1:4002:4000
    volumes:
      - ${DATA_DIR}:/data
    secrets:
      - hf_token
    devices:
      - nvidia.com/gpu=${GPU_ID}
    deploy:
      resources:
        limits:
          memory: 12GB

networks:
  genai:
    external: true
  proxy:
    external: true

secrets:
  hf_token:
    file: ${DATA_DIR}/hf_token
