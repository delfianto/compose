services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:latest-slim
    container_name: openwebui
    restart: "no"
    networks:
      - database
      - genai
      - proxy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./patches:/patches:ro
      - ${DATA_DIR}:/app/backend/data
      - ${COMPOSE_BASE}/lib/secret-env.sh:/secret-env.sh:ro
    entrypoint: ["/secret-env.sh"]
    command: ["bash", "-c", "python3 /patches/apply.py && exec bash start.sh"]
    env_file:
      - openwebui.env
    environment:
      - WEBUI_URL=https://webui.${TRAEFIK_ACME_DOMAIN}
      - CORS_ALLOW_ORIGIN=https://webui.${TRAEFIK_ACME_DOMAIN}
    secrets:
      - source: openwebui_secret_key
        target: WEBUI_SECRET_KEY
      - source: openwebui_database_url
        target: DATABASE_URL
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.webui.entrypoints=websecure"
      - "traefik.http.routers.webui.rule=Host(`webui.${TRAEFIK_ACME_DOMAIN}`)"
      - "traefik.http.routers.webui.tls.certresolver=cloudflare"
      - "traefik.http.services.webui.loadbalancer.server.port=8080"
      - "homepage.group=Artificial Intelligence"
      - "homepage.name=Open WebUI"
      - "homepage.icon=open-webui.svg"
      - "homepage.href=https://webui.${TRAEFIK_ACME_DOMAIN}"
    deploy:
      resources:
        limits:
          memory: 2GB

  sidecar:
    image: ghcr.io/delfianto/ik_llama.cpp-zen5:sha-52da392
    container_name: sidecar
    restart: "no"
    networks:
      - genai
      - proxy
    volumes:
      - ${DATA_DIR}/cache/models:/models:ro
    command: >
      --mlock
      --threads 16
      --ctx-size 32768
      --host 0.0.0.0
      --port 8080
      --reasoning off
      --reasoning-tokens block
      --model /models/${SIDECAR_MODEL}.gguf
      --jinja
    devices:
      - nvidia.com/gpu=1
    # Image has bash but no curl/wget; llama-server answers /health with 200
    # once the model is loaded, 503 while still loading
    healthcheck:
      test: >-
        bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080 &&
        printf "GET /health HTTP/1.0\r\n\r\n" >&3 &&
        grep -q " 200 " <&3'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2GB

networks:
  database:
    external: true
  genai:
    external: true
  proxy:
    external: true

secrets:
  openwebui_secret_key:
    file: ${SECRET_DIR}/openwebui_secret_key
  openwebui_database_url:
    file: ${SECRET_DIR}/openwebui_database_url
