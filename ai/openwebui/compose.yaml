services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:latest-slim
    container_name: openwebui
    restart: "no"
    networks:
      - database
      - genai
      - proxy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${DATA_DIR}:/app/backend/data
    env_file:
      - webui.env
      - webui.env.local
    environment:
      - WEBUI_URL=https://webui.${TRAEFIK_ACME_DOMAIN}
      - CORS_ALLOW_ORIGIN=https://webui.${TRAEFIK_ACME_DOMAIN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.webui.entrypoints=websecure"
      - "traefik.http.routers.webui.rule=Host(`webui.${TRAEFIK_ACME_DOMAIN}`)"
      - "traefik.http.routers.webui.tls.certresolver=cloudflare"
      - "traefik.http.services.webui.loadbalancer.server.port=8080"
      - "homepage.group=Artificial Intelligence"
      - "homepage.name=Open WebUI"
      - "homepage.icon=open-webui.svg"
      - "homepage.href=https://webui.${TRAEFIK_ACME_DOMAIN}"
    deploy:
      resources:
        limits:
          memory: ${MEM_LIMIT}

  sidecar:
    image: ghcr.io/ggml-org/llama.cpp:full-cuda13
    container_name: sidecar
    restart: "no"
    networks:
      - genai
    volumes:
      - ${DATA_DIR}/models:/models:ro
    command: >
      --server
      --mlock
      --parallel 2
      --threads 16
      --reasoning off
      --cache-type-k q4_0
      --cache-type-v q4_0
      --ctx-size 65536
      --n-gpu-layers -1
      --host 0.0.0.0
      --port 8080
      --temp 1.0
      --top-p 0.95
      --top-k 20
      --min-p 0.0
      --presence-penalty 1.5
      --repeat-penalty 1.0
      --model /models/${SIDECAR_MODEL}.gguf
    devices:
      - nvidia.com/gpu=1
    deploy:
      resources:
        limits:
          memory: ${MEM_LIMIT}

networks:
  database:
    external: true
  genai:
    external: true
  proxy:
    external: true
