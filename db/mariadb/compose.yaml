services:
  mariadb:
    image: mariadb:12-ubi10
    container_name: mariadb
    restart: "no"
    user: "0:0"
    env_file:
      - mariadb.env
    environment:
      MARIADB_AUTO_UPGRADE: "1"
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    command:
      - --innodb-buffer-pool-size=1G
      - --innodb-log-file-size=256M
      - --innodb-io-capacity=200
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    networks:
      - database
      - default
    ports:
      - 0.0.0.0:3306:3306
    secrets:
      - db_user
      - db_root
    volumes:
      - ${DATA_DIR}/mariadb:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2GB

networks:
  database:
    external: true

secrets:
  db_user:
    file: ${SECRET_DIR}/mariadb_user.txt
  db_root:
    file: ${SECRET_DIR}/mariadb_root.txt
