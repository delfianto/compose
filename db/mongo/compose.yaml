services:
  mongodb:
    image: mongo:8.2-noble
    container_name: mongodb
    restart: "no"
    entrypoint: ["/secret-env.sh"]
    command: ["docker-entrypoint.sh", "mongod"]
    env_file:
      - mongodb.env
    networks:
      - database
      - default
    ports:
      - 0.0.0.0:27017:27017
    volumes:
      - ${DATA_DIR}/mongo:/data/db
      - ${COMPOSE_BASE}/lib/secret-env.sh:/secret-env.sh:ro
    secrets:
      - source: mongo_root_password
        target: MONGO_INITDB_ROOT_PASSWORD
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1GB

networks:
  database:
    external: true

secrets:
  mongo_root_password:
    file: ${SECRET_DIR}/mongo_root_password
