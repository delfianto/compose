services:
  postgres:
    image: ghcr.io/tensorchord/vchord-postgres:pg18-v1.1.1
    container_name: pgsql
    restart: "no"
    command: postgres -c "shared_preload_libraries=vchord" -c "max_connections=200"
    healthcheck:
      test: ["CMD-SHELL", "psql -U postgres -d postgres -c \"SELECT 1 FROM pg_extension WHERE extname = 'vchord';\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - ./postgres.env
    networks:
      - database
      - default
    ports:
      - 127.0.0.1:5432:5432
    secrets:
      - db_password
    volumes:
      - ${DATA_DIR}/postgres:/var/lib/postgresql/18/docker
      - ${PROJ_DIR}/initdb.d:/docker-entrypoint-initdb.d
    deploy:
      resources:
        limits:
          memory: 2GB

networks:
  database:
    external: true

secrets:
  db_password:
    file: ${DATA_DIR}/postgres_password.txt
