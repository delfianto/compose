services:
  qdrant:
    image: qdrant/qdrant:v1.18.2-gpu-nvidia
    container_name: qdrant
    restart: "no"
    env_file:
      - qdrant.env
    networks:
      - database
      - proxy
    ports:
      - 0.0.0.0:6333:6333
      - 0.0.0.0:6334:6334
    volumes:
      - ${DATA_DIR}/qdrant:/qdrant/storage
    # The qdrant image has no curl/wget, only bash; probe the REST port via /dev/tcp
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    devices:
      - nvidia.com/gpu=${GPU_ID}
    deploy:
      resources:
        limits:
          memory: 4GB

networks:
  database:
    external: true
  proxy:
    external: true
