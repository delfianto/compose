services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:14-rootless
    container_name: forgejo
    restart: "no"
    user: "0:0"
    entrypoint: ["/secret-env.sh"]
    command: ["/usr/bin/dumb-init", "--", "/usr/local/bin/docker-entrypoint.sh"]
    environment:
      - DROP_USER=git
      - FORCE_DROP_USER=1
    networks:
      - database
      - proxy
    volumes:
      - ${DATA_DIR}/data:/var/lib/gitea
      - ${DATA_DIR}/conf:/etc/gitea
      - /etc/localtime:/etc/localtime:ro
      - ${COMPOSE_BASE}/lib/secret-env.sh:/secret-env.sh:ro
    env_file:
      - forgejo.env
    secrets:
      - source: forgejo_db_password
        target: FORGEJO__database__PASSWD
      - source: forgejo_db_password
        target: POSTGRES_PASSWORD
    ports:
      - "0.0.0.0:222:2222"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.forgejo.entrypoints=websecure"
      - "traefik.http.routers.forgejo.rule=Host(`git.${TRAEFIK_ACME_DOMAIN}`)"
      - "traefik.http.routers.forgejo.tls.certresolver=cloudflare"
      - "traefik.http.services.forgejo.loadbalancer.server.port=3000"
      - "homepage.group=Infra"
      - "homepage.name=Forgejo"
      - "homepage.icon=forgejo.svg"
      - "homepage.href=https://git.${TRAEFIK_ACME_DOMAIN}"

networks:
  database:
    external: true
  proxy:
    external: true

secrets:
  forgejo_db_password:
    file: ${SECRET_DIR}/forgejo_db_password
