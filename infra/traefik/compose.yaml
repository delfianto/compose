services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: "no"
    security_opt:
      - no-new-privileges:true
    environment:
      # Cloudflare Zero DNS API token
      - CF_DNS_API_TOKEN_FILE=/run/secrets/cf_token
    networks:
      - proxy
      - metrics
    ports:
      - 0.0.0.0:80:80
      - 0.0.0.0:443:443
    secrets:
      - cf_token
      - htpasswd
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ${DATA_DIR}/acme.json:/etc/traefik/acme.json
      - ${DOCKER_SOCK}:/var/run/docker.sock:ro
    command:
      # Traefik log level
      # Possible values: DEBUG, INFO, WARN, ERROR, FATAL
      # Default is INFO, but DEBUG is useful for troubleshooting
      - --log.level=${TRAEFIK_LOG_LEVEL}
      # Enable Docker as a provider
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=proxy
      # Entry points
      - --api.dashboard=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Enable DNS challenge
      - --certificatesresolvers.cloudflare.acme.dnschallenge=true
      - --certificatesresolvers.cloudflare.acme.dnschallenge.propagation.delayBeforeChecks=60s
      - --certificatesresolvers.cloudflare.acme.dnschallenge.propagation.disablechecks=true
      - --certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.cloudflare.acme.dnschallenge.resolvers=1.1.1.1:53,1.0.0.1:53
      # ACME configuration for Let's Encrypt
      - --certificatesresolvers.cloudflare.acme.caserver=${TRAEFIK_ACME_SERVER}
      - --certificatesresolvers.cloudflare.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.cloudflare.acme.storage=/etc/traefik/acme.json
      # Enable Prometheus metrics
      - --metrics.prometheus=false
      - --metrics.prometheus.entrypoint=metrics
      # API access from localhost only
      - --api.insecure=true
      # Enable /ping on the internal "traefik" entrypoint (:8080) for the healthcheck
      - --ping=true
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.traefik-auth.basicauth.usersfile=/run/secrets/htpasswd"
      - "traefik.enable=true"
      - "traefik.http.routers.http-catchall.entrypoints=web"
      - "traefik.http.routers.http-catchall.middlewares=redirect-to-https"
      - "traefik.http.routers.http-catchall.rule=HostRegexp(`{host:.+}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-auth@docker"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${TRAEFIK_ACME_DOMAIN}`)"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=cloudflare"
      - "traefik.http.routers.traefik-dashboard.tls=true"
      - "homepage.group=Core"
      - "homepage.name=Traefik"
      - "homepage.icon=traefik.svg"
      - "homepage.href=https://traefik.${TRAEFIK_ACME_DOMAIN}"
      - "homepage.description=Reverse Proxy & Dashboard"
      - "homepage.widget.type=traefik"
      - "homepage.widget.url=http://traefik:8080"
    deploy:
      resources:
        limits:
          memory: 512MB

secrets:
  cf_token:
    file: ${DATA_DIR}/cf_token
  htpasswd:
    file: ${DATA_DIR}/htpasswd

networks:
  proxy:
    external: true
  metrics:
    external: true
