services:
  photoprism:
    image: photoprism/photoprism:latest
    container_name: photoprism
    restart: "no"
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    entrypoint: ["/secret-env.sh"]
    command: ["/init"]
    env_file:
      - photoprism.env
    environment:
      PHOTOPRISM_INIT: tensorflow-gpu
      PHOTOPRISM_FFMPEG_ENCODER: nvidia
      PHOTOPRISM_WORKERS: 16
      PHOTOPRISM_THUMB_FILTER: lanczos
      PHOTOPRISM_READONLY: "true"
      PHOTOPRISM_UPLOAD_NSFW: "true"
    networks:
      - database
      - proxy
    volumes:
      - ${STORAGE_DIR}:/photoprism/storage
      - ${ORIGINALS_DIR}:/photoprism/originals:ro
      - ${COMPOSE_BASE}/lib/secret-env.sh:/secret-env.sh:ro
    secrets:
      - source: photoprism_db_password
        target: PHOTOPRISM_DATABASE_PASSWORD
      - source: photoprism_admin_password
        target: PHOTOPRISM_ADMIN_PASSWORD
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prism.entrypoints=websecure"
      - "traefik.http.routers.prism.rule=Host(`prism.${TRAEFIK_ACME_DOMAIN}`)"
      - "traefik.http.routers.prism.tls.certresolver=cloudflare"
      - "traefik.http.services.prism.loadbalancer.server.port=2342"
      - "homepage.group=Media"
      - "homepage.name=PhotoPrism"
      - "homepage.icon=PhotoPrism.svg"
      - "homepage.href=https://prism.${TRAEFIK_ACME_DOMAIN}"
      - "homepage.description=Photo and video management"
    devices:
      - nvidia.com/gpu=${GPU_ID}
    healthcheck:
      test: ["CMD", "photoprism", "status"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 8G

networks:
  database:
    external: true
  proxy:
    external: true

secrets:
  photoprism_db_password:
    file: ${SECRET_DIR}/photoprism_db_password
  photoprism_admin_password:
    file: ${SECRET_DIR}/photoprism_admin_password
