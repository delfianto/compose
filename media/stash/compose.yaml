services:
  stash:
    image: ghcr.io/feederbox826/stash-s6:hwaccel-alpine
    container_name: stash
    restart: "no"
    networks:
      - proxy
    logging:
      driver: json-file
      options:
        max-file: 10
        max-size: 2m
    env_file:
      - stash.env
    volumes:
      - ${DATA_DIR}/config_s6:/config
      - ${DATA_DIR}/blobs:/blobs
      - ${DATA_DIR}/cache:/cache
      - ${DATA_DIR}/generated:/generated
      - ${DATA_DIR}/metadata:/metadata
      - ${DATA_DIR}/python:/pip-install
      - ${MEDIA_DIR}:/media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stash.entrypoints=websecure"
      - "traefik.http.routers.stash.rule=Host(`stash.${TRAEFIK_ACME_DOMAIN}`)"
      - "traefik.http.routers.stash.tls.certresolver=cloudflare"
      - "traefik.http.services.stash.loadbalancer.server.port=9069"
      - "homepage.group=Media"
      - "homepage.name=StashApp"
      - "homepage.icon=stash.svg"
      - "homepage.href=https://stash.${TRAEFIK_ACME_DOMAIN}"
      - "homepage.description=Media Server for Cultured Material"
    devices:
      - nvidia.com/gpu=${GPU_ID}
    deploy:
      resources:
        limits:
          memory: 24G
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9069/login"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  stash-mcp-server:
    image: ghcr.io/donlothario/stash_mcp_server:main
    container_name: stash-mcp-server
    restart: "no"
    networks:
      - proxy
    depends_on:
      stash:
        condition: service_healthy
    environment:
      - STASH_ENDPOINT=https://stash.${TRAEFIK_ACME_DOMAIN}
    env_file:
      - mcp.env
      - mcp.env.local
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  proxy:
    external: true
