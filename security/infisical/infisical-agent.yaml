infisical:
  address: "http://infisical:8080"

auth:
  type: "universal-auth"
  config:
    client-id: "/run/secrets/infisical_client_id"
    client-secret: "/run/secrets/infisical_client_secret"

sinks:
  - type: "file"
    config:
      path: "/shared/.env"
    template: |
      {{- range .Secrets }}
      {{ .Key }}="{{ .Value }}"
      {{- end }}
